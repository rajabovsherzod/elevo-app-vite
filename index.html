<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <meta name="description" content="Elevo — Multilevel Language Platform" />
        <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc" />
        <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#09090b" />
        <meta name="color-scheme" content="light dark" />

        <!-- FOUC prevention — runs before first paint, sets theme class + bg instantly -->
        <script>
            try {
                var t = localStorage.getItem("elevo-theme");
                var isDark = t === "dark";
                document.documentElement.classList.add(isDark ? "dark-mode" : "light-mode");
                var _bg = isDark ? "#09090b" : "#f8fafc";
                document.documentElement.style.background = _bg;
                document.documentElement.style.backgroundColor = _bg;
            } catch(e) {
                document.documentElement.classList.add("light-mode");
            }
        </script>

        <!-- Critical CSS: background color before any bundle loads — eliminates black flash -->
        <style>
            html, body {
                margin: 0; padding: 0;
                background-color: #f8fafc;
                height: 100%; min-height: 100dvh;
            }
            .dark-mode, .dark-mode body { background-color: #09090b; }
            #root { min-height: 100dvh; background-color: inherit; }
        </style>

        <!-- Lexend font — display=swap keeps it non-blocking -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300..700&display=swap" rel="stylesheet" />

        <!-- Telegram fullscreen init — sync inline script, runs BEFORE React renders.
             In Telegram Mini App, window.Telegram.WebApp is pre-injected by Telegram
             BEFORE any script runs, so this fires immediately at parse time. -->
        <script>
            (function() {
                var isDarkMode = document.documentElement.classList.contains("dark-mode");
                var bgColor = isDarkMode ? "#09090b" : "#f8fafc";

                function initTg(tg) {
                    try {
                        tg.ready();
                        if (typeof tg.disableVerticalSwipes === "function") tg.disableVerticalSwipes();
                        if (typeof tg.setHeaderColor === "function") tg.setHeaderColor("bg_color");
                        if (typeof tg.setBackgroundColor === "function") tg.setBackgroundColor(bgColor);
                        if (typeof tg.setBottomBarColor === "function") tg.setBottomBarColor(bgColor);
                        if (typeof tg.requestFullscreen === "function" && !tg.isFullscreen) {
                            tg.requestFullscreen();
                        } else if (typeof tg.expand === "function") {
                            tg.expand();
                        }
                    } catch(e) {}
                }

                var tg = window.Telegram && window.Telegram.WebApp;
                if (tg) {
                    initTg(tg);
                } else {
                    // SDK async yuklanganda retry (browser dev yoki SDK kech kelsa)
                    window.__tgInitPending = { bgColor: bgColor };
                }
            })();
        </script>

        <!-- Telegram WebApp SDK — async, only needed for browser dev testing.
             In real Telegram app the SDK is already pre-injected above. -->
        <script async src="https://telegram.org/js/telegram-web-app.js" onload="
            try {
                var pending = window.__tgInitPending;
                var tg = window.Telegram && window.Telegram.WebApp;
                if (tg && pending) {
                    tg.ready();
                    if (typeof tg.disableVerticalSwipes === 'function') tg.disableVerticalSwipes();
                    if (typeof tg.setHeaderColor === 'function') tg.setHeaderColor('bg_color');
                    if (typeof tg.setBackgroundColor === 'function') tg.setBackgroundColor(pending.bgColor);
                    if (typeof tg.setBottomBarColor === 'function') tg.setBottomBarColor(pending.bgColor);
                    if (typeof tg.requestFullscreen === 'function' && !tg.isFullscreen) {
                        tg.requestFullscreen();
                    } else if (typeof tg.expand === 'function') {
                        tg.expand();
                    }
                    window.__tgInitPending = null;
                }
            } catch(e) {}
        "></script>

        <title>Elevo</title>
    </head>

    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
